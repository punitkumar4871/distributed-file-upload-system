# ─────────────────────────────────────────────────────────────────────────────
# Server Config
# ─────────────────────────────────────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────────────────────────────────────
# Multipart / File Upload Config
# ─────────────────────────────────────────────────────────────────────────────
# Allow large file chunks (up to 10 MB per chunk)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─────────────────────────────────────────────────────────────────────────────
# Upload Directory Config
# Change these paths for production / Docker volume mounts
# ─────────────────────────────────────────────────────────────────────────────
upload.temp-dir=uploads/temp
upload.final-dir=uploads/final

# ─────────────────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────────────────
logging.level.com.uploadSystem=DEBUG
logging.level.org.springframework.web=INFO