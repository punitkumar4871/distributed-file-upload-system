apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: upload-system-hpa
  namespace: upload-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upload-system
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up when average CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80   # Scale up when average memory > 80%
