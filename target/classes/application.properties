# ─────────────────────────────────────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────────────────────────────────────
# Multipart / File Upload
# ─────────────────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─────────────────────────────────────────────────────────────────────────────
# Upload Directories
# Overridden in Kubernetes via ConfigMap env variables.
# ─────────────────────────────────────────────────────────────────────────────
upload.temp-dir=${UPLOAD_TEMP_DIR:uploads/temp}
upload.final-dir=${UPLOAD_FINAL_DIR:uploads/final}

# ─────────────────────────────────────────────────────────────────────────────
# GitHub Storage Integration
# Set these as Kubernetes Secrets / environment variables in production.
# Never commit real values here.
# ─────────────────────────────────────────────────────────────────────────────
github.token=${GITHUB_TOKEN:}
github.storage.repo.owner=${GITHUB_STORAGE_REPO_OWNER:your-username}
github.storage.repo.name=${GITHUB_STORAGE_REPO_NAME:your-storage-repo}

# ─────────────────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────────────────
logging.level.com.example.upload=DEBUG
logging.level.org.springframework.web=INFO
